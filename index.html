<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VehiGest AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1e3d;
  --blue:#1d4ed8;
  --gold:#f0b84a;
  --bg:#eef0f6;
  --white:#ffffff;
  --surface:#ffffff;
  --border:#d4d9e8;
  --text:#0f1e3d;
  --muted:#6b7a99;
  --ok:#16a34a;
  --warn:#d97706;
  --danger:#dc2626;
  --ok-bg:#dcfce7;
  --warn-bg:#fef3c7;
  --danger-bg:#fee2e2;
  --font:'Inter',sans-serif;
  --radius:12px;
  --shadow:0 2px 8px rgba(15,30,61,.10);
  --shadow-lg:0 8px 32px rgba(15,30,61,.14);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}
button{font-family:var(--font);cursor:pointer}
input,select{font-family:var(--font)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .3s ease both}
.fade-in{animation:fadeIn .2s ease both}

/* ── LOGIN ── */
#login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%,#1a3a7a 100%);
  padding:24px;
}
.login-card{
  background:var(--white);border-radius:20px;padding:48px 40px;
  width:100%;max-width:420px;box-shadow:var(--shadow-lg);
  animation:fadeUp .4s ease both;
}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.login-logo-icon{
  width:46px;height:46px;background:var(--navy);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  box-shadow:0 4px 12px rgba(15,30,61,.3);
}
.login-logo-text{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.login-logo-text span{color:var(--blue)}
.login-title{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:6px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.field input,.field select{
  width:100%;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;padding:11px 14px;color:var(--text);font-size:15px;
  outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus{border-color:var(--blue);background:var(--white)}
.field input::placeholder{color:var(--muted)}
.btn-primary{
  width:100%;padding:13px;background:var(--navy);color:var(--white);border:none;
  border-radius:10px;font-size:15px;font-weight:700;letter-spacing:.2px;
  transition:background .2s,transform .1s;margin-top:8px;
  box-shadow:0 4px 14px rgba(15,30,61,.3);
}
.btn-primary:hover{background:#162d5a}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:default}

/* ── LAYOUT ── */
#app{display:flex;min-height:100vh;display:none}
.sidebar{
  width:230px;min-width:230px;background:var(--navy);
  display:flex;flex-direction:column;padding:24px 14px;gap:2px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:4px 10px 24px}
.sidebar-logo-icon{
  width:36px;height:36px;background:var(--gold);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.sidebar-logo-text{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-.3px}
.sidebar-logo-text span{color:var(--gold)}
.sidebar-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:12px 10px 4px;margin-top:4px}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:9px;
  font-size:14px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;
  transition:background .15s,color .15s;user-select:none;position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:var(--white)}
.nav-item.active{background:rgba(240,184,74,.15);color:var(--gold);font-weight:700}
.nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--danger);color:#fff;
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;
}
.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer}
.user-chip:hover{background:rgba(255,255,255,.07)}
.avatar{
  width:34px;height:34px;border-radius:50%;background:var(--blue);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.user-name{font-size:13px;font-weight:600;color:var(--white)}
.user-role{font-size:11px;color:rgba(255,255,255,.4)}

.main{flex:1;overflow-y:auto;background:var(--bg);min-width:0}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 28px;background:var(--white);border-bottom:1.5px solid var(--border);
  position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(15,30,61,.06);
}
.topbar-title{font-size:19px;font-weight:800;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{
  width:36px;height:36px;border-radius:9px;background:var(--bg);
  border:1.5px solid var(--border);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:16px;transition:background .15s;position:relative;
}
.icon-btn:hover{background:var(--border)}
.icon-btn .dot{
  position:absolute;top:5px;right:5px;width:8px;height:8px;
  background:var(--danger);border-radius:50%;border:2px solid var(--white);
}
.page{padding:24px 28px;animation:fadeUp .3s ease both}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;transition:border-color .2s,box-shadow .2s;box-shadow:var(--shadow);
}
.kpi-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(29,78,216,.1)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-icon{font-size:22px}
.kpi-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}
.kpi-badge.ok{background:var(--ok-bg);color:var(--ok)}
.kpi-badge.warn{background:var(--warn-bg);color:var(--warn)}
.kpi-badge.bad{background:var(--danger-bg);color:var(--danger)}
.kpi-badge.blue{background:#dbeafe;color:var(--blue)}
.kpi-value{font-size:30px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:4px}
.kpi-label{font-size:12px;color:var(--muted);font-weight:500}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:15px;font-weight:700;color:var(--navy)}
.btn-sm{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:var(--white);border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-weight:600;color:var(--navy);transition:background .15s,border-color .15s;
}
.btn-sm:hover{background:var(--bg);border-color:var(--blue);color:var(--blue)}
.btn-sm.accent{background:var(--navy);color:var(--white);border-color:var(--navy)}
.btn-sm.accent:hover{background:#162d5a}
.btn-sm.gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700}
.btn-sm.gold:hover{opacity:.9}

/* ── VEHICLE GRID ── */
.vehicle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.vehicle-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:16px;
  padding:20px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .2s;
  box-shadow:var(--shadow);position:relative;overflow:hidden;
}
.vehicle-card:hover{border-color:var(--blue);box-shadow:0 6px 24px rgba(29,78,216,.12);transform:translateY(-2px)}
.vehicle-card-add{
  border:2px dashed var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;min-height:220px;background:transparent;
  transition:border-color .2s,background .2s;
}
.vehicle-card-add:hover{border-color:var(--blue);background:rgba(29,78,216,.03)}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.vc-icon{font-size:28px}
.status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.4px}
.status-ok{background:var(--ok-bg);color:var(--ok)}
.status-warn{background:var(--warn-bg);color:var(--warn)}
.status-bad{background:var(--danger-bg);color:var(--danger)}
.vc-brand{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:2px}
.vc-model{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:10px}
.vc-plate{
  display:inline-block;background:var(--navy);color:var(--white);
  border-radius:6px;padding:4px 10px;font-size:13px;font-weight:700;
  font-family:monospace;letter-spacing:2px;margin-bottom:14px;
}
.vc-divider{border:none;border-top:1.5px solid var(--border);margin-bottom:14px}
.vc-stats{display:flex;gap:20px}
.vc-stat-val{font-size:14px;font-weight:700;color:var(--navy)}
.vc-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.vc-alerts{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.alert-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px}
.alert-tag.warn{background:var(--warn-bg);color:var(--warn)}
.alert-tag.bad{background:var(--danger-bg);color:var(--danger)}

/* ── ALERTS ── */
.alerts-list{display:flex;flex-direction:column;gap:10px}
.alert-row{
  background:var(--white);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  transition:border-color .15s;box-shadow:var(--shadow);
}
.alert-row.critical{border-left:4px solid var(--danger)}
.alert-row.warning{border-left:4px solid var(--warn)}
.alert-row.ok{border-left:4px solid var(--ok)}
.alert-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.alert-info{flex:1}
.alert-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:2px}
.alert-sub{font-size:12px;color:var(--muted)}
.alert-days{text-align:right;flex-shrink:0}
.alert-days-num{font-size:22px;font-weight:800;line-height:1}
.alert-days-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── DETAIL ── */
.detail-header{
  display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;
  padding:24px;background:var(--white);border:1.5px solid var(--border);
  border-radius:16px;box-shadow:var(--shadow);
}
.detail-img{font-size:52px;line-height:1}
.detail-info{flex:1}
.detail-make{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:2px}
.detail-model{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:8px}
.detail-plate{
  display:inline-block;background:var(--navy);color:var(--white);
  border-radius:8px;padding:5px 14px;font-size:15px;font-weight:700;
  font-family:monospace;letter-spacing:3px;margin-bottom:14px;
}
.detail-meta{display:flex;gap:20px;flex-wrap:wrap}
.detail-meta-item{font-size:13px;color:var(--muted)}
.detail-meta-item strong{color:var(--navy)}
.detail-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:4px;width:fit-content;box-shadow:var(--shadow)}
.tab{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:background .15s,color .15s}
.tab.active{background:var(--navy);color:var(--white)}
.tab:hover:not(.active){color:var(--navy);background:var(--bg)}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;position:relative}
.timeline::before{content:'';position:absolute;left:19px;top:0;bottom:0;width:2px;background:var(--border);z-index:0}
.tl-item{display:flex;gap:16px;padding-bottom:18px;position:relative;z-index:1}
.tl-dot{
  width:38px;height:38px;border-radius:50%;background:var(--bg);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;z-index:1;
}
.tl-dot.done{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.tl-dot.next{border-color:var(--gold);background:#fef9ec}
.tl-content{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;flex:1;box-shadow:var(--shadow)}
.tl-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.tl-name{font-size:14px;font-weight:700;color:var(--navy)}
.tl-date{font-size:12px;color:var(--muted)}
.tl-details{display:flex;gap:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.tl-details strong{color:var(--navy)}

/* ── DOCS GRID ── */
.docs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.doc-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:12px;
  padding:16px;box-shadow:var(--shadow);
}
.doc-card.expired{border-color:rgba(220,38,38,.4);background:#fff8f8}
.doc-card.warning{border-color:rgba(217,119,6,.4);background:#fffdf5}
.doc-icon{font-size:26px;margin-bottom:10px}
.doc-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px}
.doc-issuer{font-size:11px;color:var(--muted);margin-bottom:10px}
.doc-days{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;display:inline-block;margin-top:6px}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(15,30,61,.55);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s ease;
}
.modal{
  background:var(--white);border-radius:20px;padding:32px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:fadeUp .25s ease;box-shadow:0 24px 80px rgba(15,30,61,.25);
}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:19px;font-weight:800;color:var(--navy)}
.modal-close{
  width:32px;height:32px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);
}
.modal-close:hover{background:var(--border);color:var(--navy)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-footer{display:flex;gap:10px;margin-top:24px}
.btn-cancel{
  flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:10px;color:var(--navy);font-size:14px;font-weight:600;
}
.btn-cancel:hover{background:var(--border)}
.btn-save{
  flex:2;padding:12px;background:var(--navy);border:none;border-radius:10px;
  color:var(--white);font-size:14px;font-weight:700;
}
.btn-save:hover{background:#162d5a}
.btn-save:disabled{opacity:.5;cursor:default}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:200;
  background:var(--navy);border-radius:12px;padding:14px 20px;
  display:flex;align-items:center;gap:10px;animation:slideRight .3s ease;
  font-size:14px;font-weight:600;color:var(--white);box-shadow:0 8px 32px rgba(15,30,61,.3);
}

/* ── SPINNER ── */
.loading-wrap{display:flex;align-items:center;justify-content:center;height:200px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:14px;opacity:.4}
.empty-msg{font-size:15px;margin-bottom:8px;font-weight:700;color:var(--navy)}
.empty-sub{font-size:13px}

/* ── ALERTS SUMMARY BAR ── */
.alerts-summary{
  background:var(--white);border:1.5px solid var(--border);border-radius:14px;
  padding:18px 24px;margin-bottom:24px;display:flex;gap:32px;box-shadow:var(--shadow);
}
.alerts-summary-item{text-align:center}
.alerts-summary-num{font-size:30px;font-weight:800;line-height:1;margin-bottom:2px}
.alerts-summary-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.alerts-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:20px}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:20;
  background:var(--navy);border-top:1.5px solid rgba(255,255,255,.1);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  grid-template-columns:repeat(3,1fr);
}
.bottom-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;cursor:pointer;position:relative;
  color:rgba(255,255,255,.5);font-size:11px;font-weight:600;
  transition:color .15s;
}
.bottom-nav-item.active{color:var(--gold)}
.bottom-nav-item .bnav-icon{font-size:20px;line-height:1}
.bottom-nav-badge{
  position:absolute;top:2px;right:calc(50% - 18px);
  background:var(--danger);color:#fff;font-size:9px;font-weight:700;
  padding:1px 5px;border-radius:99px;border:2px solid var(--navy);
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{display:none}
  .bottom-nav{display:grid}
  .main{padding-bottom:70px}
}

@media(max-width:600px){
  /* Layout */
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .kpi-value{font-size:24px}
  .kpi-card{padding:14px}
  .page{padding:14px 14px}
  .topbar{padding:12px 16px}
  .topbar-title{font-size:17px}

  /* Login */
  .login-card{padding:32px 24px}
  .login-title{font-size:22px}

  /* Vehicles */
  .vehicle-grid{grid-template-columns:1fr;gap:12px}
  .vehicle-card-add{min-height:80px;flex-direction:row;gap:10px;justify-content:center}

  /* Dashboard 2-col → 1-col */
  #dash-grid{grid-template-columns:1fr !important}

  /* Detail header → stack */
  .detail-header{flex-direction:column;gap:14px}
  .detail-actions{flex-direction:row;flex-wrap:wrap}
  .detail-img{font-size:40px}
  .detail-model{font-size:21px}
  .kpi-grid.detail-kpis{grid-template-columns:repeat(3,1fr) !important}

  /* Tabs scroll */
  .tabs{overflow-x:auto;white-space:nowrap;width:100%}
  .tab{flex-shrink:0}

  /* Modals */
  .modal{padding:22px 18px;border-radius:16px}
  .modal-title{font-size:17px}
  .field-row{grid-template-columns:1fr}

  /* Alerts summary */
  .alerts-summary{gap:16px;padding:14px 16px}

  /* Toast */
  .toast{left:16px;right:16px;bottom:80px;font-size:13px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🚗</div>
      <div class="login-logo-text">Vehi<span>Gest</span> AR</div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, doc,
  onSnapshot, addDoc, updateDoc, deleteDoc,
  serverTimestamp, query, orderBy, getDocs, where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyDH4GvbdtPqJwUlnRDqtOUoofkL4PTXiew",
  authDomain: "vehigest-ar.firebaseapp.com",
  projectId: "vehigest-ar",
  storageBucket: "vehigest-ar.firebasestorage.app",
  messagingSenderId: "150404378851",
  appId: "1:150404378851:web:940ba835e20c4edeb215d6"
};
const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const auth = getAuth(firebaseApp);

// ── STATE ──
let vehicles = [];
let currentPage = "dashboard";
let selectedVehicleId = null;
let unsubVehicles = null;
let isLoading = true;

// ── HELPERS ──
const SERVICE_CATALOG = ["Cambio de aceite","Filtro de aire","Filtro de combustible","Frenos delanteros","Frenos traseros","Cubiertas","Alineación y balanceo","Correa de distribución","Bujías","Amortiguadores","Revisión GNC anual","Cambio de cubiertas","Servicio mayor","Servicio menor","Otro"];

function fmtNum(n){return n?.toLocaleString("es-AR")??"-"}
function fmtARS(n){return n?`$${n.toLocaleString("es-AR")}`:"-"}
function calcDaysLeft(expiry){
  if(!expiry) return null;
  return Math.round((new Date(expiry)-new Date())/86400000);
}
function calcVehicleStatus(docs){
  const days=docs.map(d=>d.daysLeft).filter(d=>d!==null);
  if(days.some(d=>d<0)) return "bad";
  if(days.some(d=>d<=30)) return "warn";
  return "ok";
}
function daysColor(d){
  if(d===null||d===undefined) return "var(--muted)";
  if(d<0) return "var(--danger)";
  if(d<=30) return "var(--warn)";
  return "var(--ok)";
}
function daysLabel(d){
  if(d===null||d===undefined) return "Sin carga";
  if(d<0) return `Vencido hace ${Math.abs(d)}d`;
  if(d===0) return "Vence hoy";
  return `${d} días`;
}
function buildAlerts(vList){
  const alerts=[];
  vList.forEach(v=>{
    v.docs.forEach(d=>{
      if(d.daysLeft===null) return;
      let level="ok";
      if(d.daysLeft<0) level="critical";
      else if(d.daysLeft<=30) level="warning";
      else if(d.daysLeft<=60) level="ok";
      else return;
      const icon=d.type.includes("VTV")?"🔍":d.type.includes("Seguro")?"🛡️":d.type.includes("GNC")?"⚡":"📋";
      const msg=d.daysLeft<0
        ?`${d.type} VENCIDA hace ${Math.abs(d.daysLeft)} días`
        :`${d.type} vence en ${d.daysLeft} días`;
      alerts.push({id:`${v.id}-${d.id}`,vehicleId:v.id,vehicle:`${v.brand} ${v.model}`,
        plate:v.plate,type:d.type,level,icon,msg,daysLeft:d.daysLeft});
    });
  });
  return alerts.sort((a,b)=>a.daysLeft-b.daysLeft);
}

// ── FIREBASE LISTENER ──
function startVehicleListener(){
  const uid=auth.currentUser.uid;
  const q=query(collection(db,"vehicles"),where("userId","==",uid),orderBy("createdAt","desc"));
  unsubVehicles=onSnapshot(q,async(snap)=>{
    const vList=await Promise.all(snap.docs.map(async(vDoc)=>{
      const v={id:vDoc.id,...vDoc.data()};
      const docsSnap=await getDocs(collection(db,"vehicles",vDoc.id,"docs"));
      const svcSnap=await getDocs(query(collection(db,"vehicles",vDoc.id,"services"),orderBy("performedAt","desc")));
      const docs=docsSnap.docs.map(d=>({id:d.id,...d.data(),daysLeft:calcDaysLeft(d.data().expiry)}));
      const services=svcSnap.docs.map(s=>({id:s.id,...s.data()}));
      return{...v,docs,services,status:calcVehicleStatus(docs)};
    }));
    vehicles=vList;
    isLoading=false;
    updateBadge();
    renderCurrentPage();
  });
}

function updateBadge(){
  const alerts=buildAlerts(vehicles);
  const count=alerts.filter(a=>a.level!=="ok").length;
  const badge=document.getElementById("sidebar-badge");
  const dot=document.getElementById("bell-dot");
  const bnavBadge=document.getElementById("bnav-badge");
  if(count>0){
    badge.textContent=count;badge.style.display="";
    dot.style.display="";
    bnavBadge.textContent=count;bnavBadge.style.display="";
  } else {
    badge.style.display="none";dot.style.display="none";
    bnavBadge.style.display="none";
  }
}

// ── NAVIGATION ──
window.goPage=function(page, vehicleId){
  currentPage=page;
  if(vehicleId) selectedVehicleId=vehicleId;
  window._detailTab = window._detailTab||"docs";
  if(page!=="vehicle-detail") window._detailTab="docs";
  // update sidebar nav
  ["dashboard","vehicles","alerts"].forEach(p=>{
    const el=document.getElementById("nav-"+p);
    if(el) el.classList.toggle("active",p===page);
  });
  // update bottom nav
  ["dashboard","vehicles","alerts"].forEach(p=>{
    const el=document.getElementById("bnav-"+p);
    if(el) el.classList.toggle("active",p===page);
  });
  // update topbar title
  const titles={dashboard:"Dashboard",vehicles:"Vehículos",alerts:"Alertas","vehicle-detail":""};
  let title=titles[page]||"";
  if(page==="vehicle-detail"){
    const v=vehicles.find(v=>v.id===selectedVehicleId);
    title=v?`${v.brand} ${v.model}`:"Detalle";
  }
  document.getElementById("topbar-title").textContent=title;
  renderCurrentPage();
}

function renderCurrentPage(){
  const el=document.getElementById("page-content");
  if(currentPage==="dashboard") el.innerHTML=renderDashboard();
  else if(currentPage==="vehicles") el.innerHTML=renderVehicles();
  else if(currentPage==="vehicle-detail") el.innerHTML=renderVehicleDetail();
  else if(currentPage==="alerts") el.innerHTML=renderAlerts();
}

// ── SPINNER HTML ──
function spinnerHtml(){return`<div class="loading-wrap"><div class="spinner"></div></div>`}

// ── DASHBOARD ──
function renderDashboard(){
  if(isLoading) return`<div class="page">${spinnerHtml()}</div>`;
  const alerts=buildAlerts(vehicles);
  const topAlerts=alerts.filter(a=>a.level!=="ok").slice(0,5);
  return`
  <div class="page fade-up">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-icon">🚗</span><span class="kpi-badge blue">Flota</span></div>
        <div class="kpi-value">${vehicles.length}</div>
        <div class="kpi-label">Vehículos totales</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-icon">✅</span><span class="kpi-badge ok">OK</span></div>
        <div class="kpi-value" style="color:var(--ok)">${vehicles.filter(v=>v.status==="ok").length}</div>
        <div class="kpi-label">Al día</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-icon">⚠️</span><span class="kpi-badge warn">Atención</span></div>
        <div class="kpi-value" style="color:var(--warn)">${vehicles.filter(v=>v.status==="warn").length}</div>
        <div class="kpi-label">Por vencer pronto</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-top"><span class="kpi-icon">🚨</span><span class="kpi-badge bad">Crítico</span></div>
        <div class="kpi-value" style="color:var(--danger)">${vehicles.filter(v=>v.status==="bad").length}</div>
        <div class="kpi-label">Requieren acción</div>
      </div>
    </div>
    ${vehicles.length===0?`
      <div class="empty">
        <div class="empty-icon">🚗</div>
        <div class="empty-msg">No hay vehículos cargados</div>
        <div class="empty-sub">Agregá tu primer vehículo desde la sección Vehículos</div>
      </div>
    `:`
    <div id="dash-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div class="sec-header"><span class="sec-title">Flota reciente</span><button class="btn-sm" onclick="goPage('vehicles')">Ver todo →</button></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${vehicles.slice(0,3).map(v=>`
            <div class="vehicle-card" style="padding:14px 16px" onclick="goPage('vehicle-detail','${v.id}')">
              <div style="display:flex;align-items:center;gap:12px">
                <span style="font-size:24px">${v.icon||"🚗"}</span>
                <div style="flex:1">
                  <div style="font-size:11px;color:var(--muted)">${v.brand}</div>
                  <div style="font-size:15px;font-weight:800;color:var(--navy)">${v.model}</div>
                </div>
                <div class="status-pill status-${v.status}">${v.status==="ok"?"Al día":v.status==="warn"?"Atención":"Crítico"}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
      <div>
        <div class="sec-header"><span class="sec-title">Alertas urgentes</span><button class="btn-sm" onclick="goPage('alerts')">Ver todas →</button></div>
        ${topAlerts.length===0?`<div style="font-size:13px;color:var(--muted);padding:20px 0">✅ Todo al día</div>`:`
        <div class="alerts-list">
          ${topAlerts.map(a=>`
            <div class="alert-row ${a.level}" style="cursor:pointer" onclick="goPage('vehicle-detail','${a.vehicleId}')">
              <span class="alert-icon">${a.icon}</span>
              <div class="alert-info">
                <div class="alert-title">${a.type} — ${a.vehicle}</div>
                <div class="alert-sub" style="font-family:monospace;font-size:11px;letter-spacing:1px">${a.plate}</div>
              </div>
              <div class="alert-days">
                <div class="alert-days-num" style="color:${daysColor(a.daysLeft)}">${Math.abs(a.daysLeft)}</div>
                <div class="alert-days-lbl">${a.daysLeft<0?"días exp":"días"}</div>
              </div>
            </div>
          `).join("")}
        </div>`}
      </div>
    </div>`}
  </div>`;
}

// ── VEHICLES LIST ──
function renderVehicles(){
  if(isLoading) return`<div class="page">${spinnerHtml()}</div>`;
  return`
  <div class="page fade-up">
    <div class="sec-header" style="margin-bottom:20px">
      <span class="sec-title" style="font-size:17px">Todos los vehículos</span>

          <div class="vc-brand">${v.brand} ${v.year||""}</div>

          <div class="vc-stats">

            <div><div class="vc-stat-val">${v.fuel||""}${v.gnc?" + GNC":""}</div><div class="vc-stat-lbl">Combustible</div></div>
          </div>

          <div class="vc-alerts">

            `).join("")}
          </div>`:""}
        </div>
      `).join("")}
      <div class="vehicle-card vehicle-card-add" onclick="openAddVehicleModal()">
        <span style="font-size:36px;margin-bottom:10px;opacity:.35;color:var(--blue)">＋</span>

// ── VEHICLE DETAIL ──
function renderVehicleDetail(){
  const vehicle=vehicles.find(v=>v.id===selectedVehicleId);
  if(!vehicle) return`<div class="page"><div class="empty"><div class="empty-icon">🚗</div><div class="empty-msg">Vehículo no encontrado</div></div></div>`;
  const totalCost=vehicle.services.filter(s=>s.done).reduce((a,s)=>a+(s.cost||0),0);
  const tab=window._detailTab||"docs";
  return`
  <div class="page fade-up">
    <div style="margin-bottom:16px"><button class="btn-sm" onclick="goPage('vehicles')">← Volver</button></div>
    <div class="detail-header">
      <span class="detail-img">${vehicle.icon||"🚗"}</span>
      <div class="detail-info">
        <div class="detail-make">${vehicle.brand} · ${vehicle.year||""}</div>
        <div class="detail-model">${vehicle.model}</div>
        <div class="detail-plate">${vehicle.plate}</div>
        <div class="detail-meta">
          <div class="detail-meta-item">Combustible: <strong>${vehicle.fuel||""}${vehicle.gnc?" + GNC":""}</strong></div>
          <div class="detail-meta-item">Kilometraje: <strong>${fmtNum(vehicle.km)} km</strong></div>
          <div class="detail-meta-item">Color: <strong>${vehicle.color||"—"}</strong></div>
        </div>
      </div>
      <div class="detail-actions">
        <div class="status-pill status-${vehicle.status}" style="font-size:13px;padding:6px 14px;text-align:center">
          ${vehicle.status==="ok"?"✅ Al día":vehicle.status==="warn"?"⚠️ Atención":"🚨 Crítico"}
        </div>
        <button class="btn-sm" style="margin-top:8px" onclick="openAddDocModal()">＋ Documento</button>
        <button class="btn-sm gold" onclick="openAddServiceModal()">＋ Service</button>
      </div>
    </div>
    <div class="kpi-grid detail-kpis" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="kpi-card"><div class="kpi-icon">🔧</div><div class="kpi-value" style="font-size:24px">${vehicle.services.filter(s=>s.done).length}</div><div class="kpi-label">Services realizados</div></div>
      <div class="kpi-card"><div class="kpi-icon">💰</div><div class="kpi-value" style="font-size:20px">${fmtARS(totalCost)}</div><div class="kpi-label">Gasto total</div></div>
      <div class="kpi-card"><div class="kpi-icon">📋</div>
        <div class="kpi-value" style="font-size:24px;color:${vehicle.docs.some(d=>d.daysLeft!==null&&d.daysLeft<0)?"var(--danger)":vehicle.docs.some(d=>d.daysLeft!==null&&d.daysLeft<30)?"var(--warn)":"var(--ok)"}">
          ${vehicle.docs.filter(d=>d.daysLeft!==null&&d.daysLeft<0).length>0?"⚠":"✓"}
        </div>
        <div class="kpi-label">Estado documentación</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${tab==="docs"?"active":""}" onclick="switchTab('docs')">📋 Documentos</div>
      <div class="tab ${tab==="services"?"active":""}" onclick="switchTab('services')">🔧 Historial de service</div>
    </div>
    <div id="tab-content">
      ${tab==="docs"?renderDocsTab(vehicle):renderServicesTab(vehicle)}
    </div>
  </div>`;
}

function renderDocsTab(vehicle){
  if(vehicle.docs.length===0) return`<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">Sin documentos</div><div class="empty-sub">Cargá el primero con el botón de arriba</div></div>`;
  return`<div class="docs-grid fade-in">${vehicle.docs.map(d=>{
    const cls=d.daysLeft===null?"":d.daysLeft<0?"expired":d.daysLeft<30?"warning":"";
    return`
    <div class="doc-card ${cls}">
      <div class="doc-icon">${d.type.includes("VTV")?"🔍":d.type.includes("Seguro")?"🛡️":d.type.includes("GNC")?"⚡":d.type.includes("Patente")?"📋":"📄"}</div>
      <div class="doc-name">${d.type}</div>
      <div class="doc-issuer">${d.issuer||"—"}</div>
      ${d.policy?`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-family:monospace">${d.policy}</div>`:""}
      ${d.expiry?`
        <div style="font-size:10px;color:var(--muted);margin-bottom:2px">VENCE</div>
        <div style="font-weight:700;font-size:14px;color:var(--navy)">${d.expiry}</div>
        <div class="doc-days" style="background:${d.daysLeft<0?"var(--danger-bg)":d.daysLeft<30?"var(--warn-bg)":"var(--ok-bg)"};color:${daysColor(d.daysLeft)}">${daysLabel(d.daysLeft)}</div>
      `:`<div style="font-size:12px;color:var(--muted);font-style:italic">Sin fecha de vencimiento</div>`}
      ${d.paid>0?`<div style="font-size:11px;color:var(--muted);margin-top:8px">Pagado: <strong style="color:var(--navy)">${fmtARS(d.paid)}</strong></div>`:""}
    </div>`;
  }).join("")}</div>`;
}

function renderServicesTab(vehicle){
  if(vehicle.services.length===0) return`<div class="empty"><div class="empty-icon">🔧</div><div class="empty-msg">Sin services</div><div class="empty-sub">Registrá el primero con el botón de arriba</div></div>`;
  return`<div class="timeline fade-in">${vehicle.services.map(s=>`
    <div class="tl-item">
      <div class="tl-dot ${s.done?"done":"next"}">${s.done?"✓":"→"}</div>
      <div class="tl-content">
        <div class="tl-top">
          <span class="tl-name">${s.type}</span>
          <span class="tl-date">${s.done?s.performedAt:`<span style="color:var(--gold);font-weight:700">Próximo</span>`}</span>
        </div>
        <div class="tl-details">
          ${s.km?`<span>Km: <strong>${fmtNum(s.km)}</strong></span>`:""}
          ${s.nextKm?`<span>Próximo: <strong>${fmtNum(s.nextKm)} km</strong></span>`:""}
          ${s.workshop?`<span>Taller: <strong>${s.workshop}</strong></span>`:""}
          ${s.cost>0?`<span>Costo: <strong style="color:var(--blue)">${fmtARS(s.cost)}</strong></span>`:""}
        </div>
      </div>
    </div>
  `).join("")}</div>`;
}

window.switchTab=function(tab){
  window._detailTab=tab;
  renderCurrentPage();
}

// ── ALERTS PAGE ──
function renderAlerts(){
  if(isLoading) return`<div class="page">${spinnerHtml()}</div>`;
  const alerts=buildAlerts(vehicles);
  const critical=alerts.filter(a=>a.level==="critical");
  const warning=alerts.filter(a=>a.level==="warning");
  const ok=alerts.filter(a=>a.level==="ok");
  function section(title,color,items){
    if(!items.length) return"";
    return`
    <div class="alerts-section-title" style="color:${color}">${title}</div>
    <div class="alerts-list">
      ${items.map(a=>`
        <div class="alert-row ${a.level}" style="cursor:pointer" onclick="goPage('vehicle-detail','${a.vehicleId}')">
          <span class="alert-icon">${a.icon}</span>
          <div class="alert-info">
            <div class="alert-title">${a.msg}</div>
            <div class="alert-sub"><span style="font-family:monospace;font-size:11px;letter-spacing:1px">${a.plate}</span><span style="margin:0 8px;opacity:.4">·</span><span>${a.vehicle}</span></div>
          </div>
          <div class="alert-days">
            <div class="alert-days-num" style="color:${daysColor(a.daysLeft)}">${a.daysLeft!==null?Math.abs(a.daysLeft):"—"}</div>
            <div class="alert-days-lbl">${a.daysLeft<0?"días exp.":"días rest."}</div>
          </div>
        </div>
      `).join("")}
    </div>`;
  }
  return`
  <div class="page fade-up">
    <div class="alerts-summary">
      <div class="alerts-summary-item">
        <div class="alerts-summary-num" style="color:var(--danger)">${critical.length}</div>
        <div class="alerts-summary-lbl">Críticas</div>
      </div>
      <div style="width:1px;background:var(--border)"></div>
      <div class="alerts-summary-item">
        <div class="alerts-summary-num" style="color:var(--warn)">${warning.length}</div>
        <div class="alerts-summary-lbl">Advertencias</div>
      </div>
      <div style="width:1px;background:var(--border)"></div>
      <div class="alerts-summary-item">
        <div class="alerts-summary-num" style="color:var(--ok)">${ok.length}</div>
        <div class="alerts-summary-lbl">Al día</div>
      </div>
      <div style="margin-left:auto;align-self:center;font-size:12px;color:var(--muted)">Tocá una alerta para ver el vehículo</div>
    </div>
    ${alerts.length===0?`<div class="empty"><div class="empty-icon">🔔</div><div class="empty-msg">Sin alertas por ahora</div><div class="empty-sub">Cargá documentos con vencimiento para que aparezcan acá</div></div>`:""}
    ${section("🚨 Requieren acción inmediata","var(--danger)",critical)}
    ${section("⚠️ Próximos a vencer","var(--warn)",warning)}
    ${section("✅ En orden","var(--ok)",ok)}
  </div>`;
}

window.saveVehicle=async function(){
  const brand=document.getElementById("m-brand").value.trim();
  const model=document.getElementById("m-model").value.trim();
  const plate=document.getElementById("m-plate").value.trim();
  if(!brand||!model||!plate){alert("Completá marca, modelo y patente");return;}
  const btn=document.getElementById("modal-save-btn");
  btn.disabled=true;btn.textContent="Guardando...";
  await addDoc(collection(db,"vehicles"),{
    brand,model,year:parseInt(document.getElementById("m-year").value)||2024,
    plate:plate.toUpperCase(),fuel:document.getElementById("m-fuel").value,
    gnc:document.getElementById("m-gnc").value==="si",
    km:parseInt(document.getElementById("m-km").value)||0,
    color:document.getElementById("m-color").value,
    icon:"🚗",userId:auth.currentUser.uid,createdAt:serverTimestamp()
  });
  closeModal();
  showToast(`${brand} ${model} agregado`);
}

// ── AUTH ──
window.doLogin=async function(){
  const email=document.getElementById("login-email").value.trim();
  const pass=document.getElementById("login-pass").value;
  const btn=document.getElementById("login-btn");
  const errEl=document.getElementById("auth-error");
  errEl.style.display="none";
  if(!email||!pass){errEl.textContent="Completá email y contraseña.";errEl.style.display="";return;}
  if(pass.length<6){errEl.textContent="La contraseña debe tener al menos 6 caracteres.";errEl.style.display="";return;}
  btn.disabled=true;btn.textContent="Ingresando...";
  try {
    // Intentar login primero
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    if(e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"||e.code==="auth/invalid-email"&&false) {
      // Crear cuenta nueva
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch(e2) {
        btn.disabled=false;btn.textContent="Ingresar →";
        errEl.textContent=authError(e2.code);errEl.style.display="";
        return;
      }
    } else {
      btn.disabled=false;btn.textContent="Ingresar →";
      errEl.textContent=authError(e.code);errEl.style.display="";
      return;
    }
  }
  // onAuthStateChanged se encarga del resto
}

window.doLogout=async function(){
  if(unsubVehicles) unsubVehicles();
  await signOut(auth);
  vehicles=[];isLoading=true;
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("login-email").value="";
  document.getElementById("login-pass").value="";
  document.getElementById("login-btn").disabled=false;
  document.getElementById("login-btn").textContent="Ingresar →";
}

function authError(code){
  const map={
    "auth/wrong-password":"Contraseña incorrecta.",
    "auth/invalid-credential":"Email o contraseña incorrectos.",
    "auth/email-already-in-use":"Ese email ya está registrado con otra contraseña.",
    "auth/too-many-requests":"Demasiados intentos. Esperá unos minutos.",
    "auth/network-request-failed":"Sin conexión. Revisá tu internet.",
    "auth/invalid-email":"El email no es válido.",
  };
  return map[code]||"Error al ingresar. Intentá de nuevo.";
}

function setUserUI(user){
  const initials=user.email.substring(0,2).toUpperCase();
  const el=document.getElementById("sidebar-avatar");
  const nameEl=document.getElementById("sidebar-username");
  if(el) el.textContent=initials;
  if(nameEl) nameEl.textContent=user.email;
}

onAuthStateChanged(auth, user=>{
  if(user){
    setUserUI(user);
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="flex";
    startVehicleListener();
    renderCurrentPage();
  } else {
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

</script>
